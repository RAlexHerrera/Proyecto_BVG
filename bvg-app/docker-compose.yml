# ============================================================
# docker-compose.yml - BVG Sistema Completo
# Banco de Vivienda Guatemala
#
# Servicios:
#   db:       PostgreSQL 15      → puerto 5432
#   backend:  Node.js + Express  → puerto 4000
#   frontend: React + Nginx      → puerto 3000
#
# Uso:
#   docker-compose up -d --build   (primera vez o tras cambios)
#   docker-compose up -d           (arrancar sin reconstruir)
#   docker-compose down -v         (reset completo con datos)
#   docker-compose logs -f         (ver todos los logs)
# ============================================================

version: '3.9'

services:

  # ── BASE DE DATOS ─────────────────────────────────────────
  db:
    image: postgres:15
    container_name: bvg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: BVG_Pass2024!
      POSTGRES_DB:       bvg
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bvg"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bvg_network

  # ── BACKEND API ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bvg_backend
    restart: unless-stopped
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     bvg
      DB_USER:     postgres
      DB_PASSWORD: BVG_Pass2024!
      PORT:        4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bvg_network

  # ── FRONTEND ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bvg_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - bvg_network

  # ── PGADMIN (opcional) ────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bvg_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@bvg.com.gt
      PGADMIN_DEFAULT_PASSWORD: Admin2024!
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - bvg_network

# ── VOLÚMENES ─────────────────────────────────────────────
volumes:
  pgdata:       { name: bvg_pgdata       }
  pgadmin_data: { name: bvg_pgadmin_data }

# ── RED ───────────────────────────────────────────────────
networks:
  bvg_network:
    name: bvg_network
    driver: bridge
