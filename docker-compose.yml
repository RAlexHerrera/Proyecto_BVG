# ============================================================
# docker-compose.yml - Banco de Vivienda Guatemala (BVG)
# ============================================================
# Servicios:
#   - db:       PostgreSQL 15 con la BD bvg
#   - pgadmin:  Interfaz web para administrar la BD (opcional)
#
# Uso:
#   docker-compose up -d        → levantar en background
#   docker-compose down         → detener
#   docker-compose logs -f db   → ver logs de postgres
# ============================================================

version: '3.9'

services:

  # ----------------------------------------------------------
  # BASE DE DATOS: PostgreSQL 15
  # ----------------------------------------------------------
  db:
    image: postgres:15
    container_name: bvg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: BVG_Pass2024!
      POSTGRES_DB:       bvg
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"         # Accesible desde DBeaver en localhost:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d   # Scripts de inicialización
      - ./backups:/backups                        # Carpeta de backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bvg"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bvg_network

  # ----------------------------------------------------------
  # PGADMIN: Interfaz web de administración (opcional)
  # Acceso: http://localhost:5050
  # Login:  admin@bvg.com.gt / Admin2024!
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bvg_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@bvg.com.gt
      PGADMIN_DEFAULT_PASSWORD: Admin2024!
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - bvg_network

# ============================================================
# VOLÚMENES PERSISTENTES
# ============================================================
volumes:
  pgdata:
    name: bvg_pgdata
  pgadmin_data:
    name: bvg_pgadmin_data

# ============================================================
# RED INTERNA
# ============================================================
networks:
  bvg_network:
    name: bvg_network
    driver: bridge